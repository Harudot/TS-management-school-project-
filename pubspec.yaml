name: ts_management
description: "Smart Campus mobile + web app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # State + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Auth
  google_sign_in: ^6.2.1

  # Storage / prefs
  shared_preferences: ^2.3.2

  # UI / utils
  cached_network_image: ^3.4.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  intl: ^0.19.0
  collection: ^1.18.0

  # Notifications
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
